name: CI and Deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_prod:
        description: "Also deploy prod"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  quality:
    name: Build, Lint, Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        environment: [dev, prod]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: Terraform Init
        working-directory: infrastructure/terraform/environments/${{ matrix.environment }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: infrastructure/terraform/environments/${{ matrix.environment }}
        run: terraform validate

  terraform-test:
    name: Terraform Test
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: Terraform Init
        working-directory: infrastructure/terraform/modules/dispatcher_service
        run: terraform init -backend=false

      - name: Terraform Test
        working-directory: infrastructure/terraform/modules/dispatcher_service
        run: terraform test

  deploy-dev:
    name: Deploy Dev
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && github.ref_type == 'branch'
    runs-on: ubuntu-latest
    needs: [terraform-validate, terraform-test]
    environment: dev
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@19d944daaa35f0fa1d3f7f8af1d3f2e5de25c5b7 # v2

      - name: Ensure ECR repository exists
        env:
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY_DEV }}
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$ECR_REPOSITORY" --image-scanning-configuration scanOnPush=true >/dev/null

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY_DEV }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: Terraform Init
        working-directory: infrastructure/terraform/environments/dev
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=dispatcher-v2/dev/terraform.tfstate" \
            -backend-config="region=${{ vars.TF_STATE_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform Plan (Dev)
        working-directory: infrastructure/terraform/environments/dev
        env:
          TF_VAR_container_image: ${{ env.IMAGE_URI }}
          TF_VAR_github_app_id: ${{ secrets.APP_ID }}
          TF_VAR_github_app_slug: org-repo-workflows-runner-alpha
          TF_VAR_project_name: dispatcher-v2
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_create_managed_secrets: "true"
        run: terraform plan -out tfplan

      - name: Terraform Apply (Dev)
        working-directory: infrastructure/terraform/environments/dev
        env:
          TF_VAR_container_image: ${{ env.IMAGE_URI }}
          TF_VAR_github_app_id: ${{ secrets.APP_ID }}
          TF_VAR_github_app_slug: org-repo-workflows-runner-alpha
          TF_VAR_project_name: dispatcher-v2
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_create_managed_secrets: "true"
        run: terraform apply -auto-approve tfplan

  deploy-prod:
    name: Deploy Prod
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_prod == 'true' && github.ref == 'refs/heads/main' && github.ref_type == 'branch'
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: prod
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@19d944daaa35f0fa1d3f7f8af1d3f2e5de25c5b7 # v2

      - name: Ensure ECR repository exists
        env:
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY_PROD }}
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$ECR_REPOSITORY" --image-scanning-configuration scanOnPush=true >/dev/null

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY_PROD }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: Terraform Init
        working-directory: infrastructure/terraform/environments/prod
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=dispatcher-v2/prod/terraform.tfstate" \
            -backend-config="region=${{ vars.TF_STATE_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform Plan (Prod)
        working-directory: infrastructure/terraform/environments/prod
        env:
          TF_VAR_container_image: ${{ env.IMAGE_URI }}
          TF_VAR_github_app_id: ${{ secrets.APP_ID }}
          TF_VAR_github_app_slug: org-repo-workflows-runner-alpha
          TF_VAR_project_name: dispatcher-v2
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_create_managed_secrets: "true"
        run: terraform plan -out tfplan

      - name: Terraform Apply (Prod)
        working-directory: infrastructure/terraform/environments/prod
        env:
          TF_VAR_container_image: ${{ env.IMAGE_URI }}
          TF_VAR_github_app_id: ${{ secrets.APP_ID }}
          TF_VAR_github_app_slug: org-repo-workflows-runner-alpha
          TF_VAR_project_name: dispatcher-v2
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_create_managed_secrets: "true"
        run: terraform apply -auto-approve tfplan
