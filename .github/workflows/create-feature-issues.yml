          # ── Issue 16: Supply Chain Attestation Passthrough ────────────────────
          create_issue "16" "Feature: Supply Chain Attestation Passthrough" \
          '## Summary

When the source workflow produces an SLSA provenance attestation or an SBOM (Software Bill of Materials), automatically pass a reference to that attestation as an input to the target workflow so that the deployment pipeline can verify it before proceeding.

## Motivation

Supply chain security is increasingly important. Teams using `attest-build-provenance` or Sigstore in CI want the dispatcher to carry attestation evidence forward into deployment pipelines without requiring manual input wiring in every `dispatching.yml`.

## Proposed `dispatching.yml` Extension

```yaml
outbound:
  - source:
      workflow: build.yml
    targets:
      - repository: org/target-repo
        workflow: deploy.yml
        pass_attestations: true
```

## Mechanism

1. The dispatcher calls the GitHub Attestations API to check whether the source run produced any attestations.
2. If attestations are found, their bundle references are injected as reserved inputs when calling `workflow_dispatch` on the target:
   - `_attestation_bundle_url` — URL to the SLSA provenance bundle
   - `_sbom_url` — URL to the SBOM artifact (if present)
3. The target workflow is responsible for verifying the attestation before proceeding.

## Constraints

- This feature is opt-in per target (`pass_attestations: true`). Off by default.
- If no attestations are found, dispatch proceeds without the reserved inputs (not an error).
- If attestation fetch fails transiently, standard retry/backoff applies.
- Reserved input names (`_attestation_*`) are validated in the Zod schema and blocked from manual use in `inputs`.

## Acceptance Criteria

- [ ] `pass_attestations` boolean field is supported on outbound targets in the schema
- [ ] Dispatcher calls the GitHub Attestations API for the source run when `pass_attestations: true`
- [ ] Attestation bundle references are injected as `_attestation_bundle_url` and `_sbom_url` inputs
- [ ] Dispatch proceeds normally if no attestations are found (no-op, not an error)
- [ ] Reserved input names are blocked from manual use in the `inputs` field
- [ ] Attestation fetch errors are retried with standard backoff
- [ ] Unit tests cover attestation found, not found, fetch error, and reserved key conflict'

