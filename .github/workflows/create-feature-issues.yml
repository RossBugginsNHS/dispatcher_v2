name: Create Feature Issues

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Branch to commit the updated FEATURES.md to'
        required: true
        default: 'copilot/plan-new-features'

permissions:
  issues: write
  contents: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.inputs.target_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issues and update FEATURES.md
        env:
          GH_TOKEN: ${{ secrets.ISSUE_TOKEN }}
          REPO: ${{ github.repository }}
        run: python3 scripts/create-feature-issues.py

      - name: Commit updated FEATURES.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add FEATURES.md
          if git diff --staged --quiet; then
            echo "No changes to FEATURES.md — already up to date."
          else
            git commit -m "docs: add GitHub issue references to FEATURES.md [skip ci]"
            git push origin HEAD
            echo "FEATURES.md committed and pushed."
          fi
